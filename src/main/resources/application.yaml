spring:
  application:
    name: seat-service
  profiles:
    active: local

  config:
    import: "optional:configserver:"

  datasource:
    url: jdbc:postgresql://localhost:5432/ticketing
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

cloud:
  config:
    import-check:
      enabled: false

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    enabled: false