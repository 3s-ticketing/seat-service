server:
  port: 8081

spring:
  application:
    name: seat-service
  profiles:
    active: local

  main:
    #common 모듈에서 repository 스캔 겹침
    #나중에 등록된 Bean이 기존 Bean을 덮어씀
    allow-bean-definition-overriding: true

  config:
    import: "optional:configserver:"

  datasource:
    url: jdbc:postgresql://localhost:5432/ticketing
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

cloud:
  config:
    import-check:
      enabled: false

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    enabled: false